name: Update GitHub metrics

on:
  schedule:
    - cron: "0 */6 * * *"   # refreshes every 6 hours
  workflow_dispatch:         # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg

          # Core account overview: followers, stars, commits, PRs, issues
          base: header, activity, community, repositories, metadata

          # Language breakdown across your repos
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_details: bytes-size, percentage

          # Commit habits (day/time patterns)
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 7

          # Recent public activity feed
          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_limit: 5

          # Pinned/starred repos
          plugin_repositories: yes
          plugin_stars: yes
          plugin_stars_limit: 4
