name: Update GitHub metrics

on:
  schedule:
    - cron: "0 */6 * * *"   # refreshes every 6 hours
  workflow_dispatch:         # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          committer_message: "chore: refresh live GitHub metrics [skip ci]"

          # Core account overview: followers, stars, commits, PRs, issues
          base: header, activity, community, repositories, metadata

          # Detailed, real analytics pulled from your entire repo history
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_load: 300
          plugin_languages_details: bytes-size, percentage

          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 7
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_limit: 5
          plugin_activity_visibility: public

          plugin_repositories: yes
          plugin_repositories_forks: yes
          plugin_repositories_random: no

          plugin_stars: yes
          plugin_stars_limit: 4

          plugin_contributors: yes
          plugin_contributors_extras: yes
